<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Auditoría | BebidApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/style.css}" rel="stylesheet">
    <style>
        .audit-header {
            background: linear-gradient(45deg, #2c3e50, #4ca1af);
            color: white;
            padding: 2rem;
            border-radius: 0 0 10px 10px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">🍺 BebidApp Auditoría</a>
        </div>
    </nav>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card shadow-sm border-left-primary">
                    <div class="card-body">
                        <h5 class="card-title text-primary">Total Registros</h5>
                        <p class="card-text fs-4 fw-bold" th:text="${#lists.size(listaVentas)} + ' ventas encontradas'"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th># ID</th>
                                <th>Fecha y Hora</th>
                                <th>Cliente</th>
                                <th class="text-end">Monto Total</th>
                                <th class="text-center">Estado</th> </tr>
                        </thead>
                        <tbody>
                            <tr th:each="venta : ${listaVentas}">
                                <td class="fw-bold" th:text="'#' + ${venta.idVenta}"></td>
                                <td th:text="${#temporals.format(venta.fecha, 'dd-MM-yyyy HH:mm')}"></td>
                                <td>
                                    <span class="fw-semibold" th:text="${venta.nombreCliente}"></span>
                                </td>
                                <td class="text-end">
                                    <span class="badge bg-success fs-6">
                                        $ <span th:text="${venta.total}"></span>
                                    </span>
                                </td>
                                <td class="text-center">
                                    <span class="badge bg-primary">Completado</span>
                                </td>
                            </tr>
                            
                            <tr th:if="${#lists.isEmpty(listaVentas)}">
                                <td colspan="5" class="text-center py-4 text-muted">
                                    No hay registros de ventas en el sistema.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4 mb-5 text-center">
            <a th:href="@{/}" class="btn btn-secondary btn-lg shadow">
                ⬅️ Volver al Catálogo
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
